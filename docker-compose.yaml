services:
  app-testing:
    image: biyard/app:${COMMIT}
    restart: always
    environment:
      IP: "0.0.0.0"
      PORT: "8080"
      ENV: "local"
      DYNAMO_TABLE_PREFIX: "biyard-local"
      DYNAMO_ENDPOINT: "http://localstack:4566"
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-test}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-test}
      AWS_REGION: ${AWS_REGION:-us-east-1}
    ports:
      - "8080:8080"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "apt update && apt install curl -y && curl -f http://localhost:8080 || exit 1",
        ]
      interval: 10s
      timeout: 10s
      retries: 100
    depends_on:
      localstack:
        condition: service_healthy
      localstack-init:
        condition: service_completed_successfully
    networks:
      - biyard-network
    profiles:
      - testing

  landing:
    image: node:22.14
    restart: always
    ports:
      - "5000:5000"
    volumes:
      - ./.build/landing/node_modules:/app/node_modules
      - ./.build/landing/pnpm-store:/app/.pnpm-store
      - ./scripts/web-entrypoint.sh:/app/entrypoint.sh
      - ./landing:/app
    working_dir: /app
    environment:
      PORT: 5000
      VITE_API_URL: "http://localhost:3000"
      VITE_LOG_LEVEL: ${VITE_LOG_LEVEL:-debug}

      NODE_ENV: development
    command: ["bash", "entrypoint.sh"]
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:4000/api/version || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 100
    profiles:
      - development

  localstack:
    hostname: localstack
    image: localstack/localstack
    restart: always
    ports:
      - "4566:4566"
    environment:
      PERSISTENCE: ${LOCALSTACK_PERSISTENCE:-1}
      LOCALSTACK_ACKNOWLEDGE_ACCOUNT_REQUIREMENT: ${LOCALSTACK_ACKNOWLEDGE_ACCOUNT_REQUIREMENT:-1}
      SERVICES: dynamodb,s3,sqs
      DYNAMODB_SHARE_DB: 1
      SQS_ENDPOINT_STRATEGY: "off"
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-test}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-test}
      AWS_DEFAULT_REGION: ${AWS_REGION:-us-east-1}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s
    volumes:
      - ./.build/localstack-data:/var/lib/localstack
    networks:
      - biyard-network
    profiles:
      - testing
      - development
      - infra

  # DynamoDB initialization
  localstack-init:
    image: amazonlinux:2023
    environment:
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-test}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-test}
      AWS_DEFAULT_REGION: ${AWS_REGION:-us-east-1}
      DYNAMO_ENDPOINT: http://localstack:4566
      LOCALSTACK_ENDPOINT: http://localstack:4566
    volumes:
      - ./scripts:/scripts
    command: ["bash", "/scripts/localstack-init-entrypoint.sh"]
    depends_on:
      localstack:
        condition: service_healthy
    networks:
      - biyard-network
    profiles:
      - testing
      - development
      - infra

  dynamodb-admin:
    image: aaronshaf/dynamodb-admin:latest
    restart: always
    ports:
      - "8081:8001"
    environment:
      DYNAMO_ENDPOINT: http://localstack:4566
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-test}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-test}
      AWS_DEFAULT_REGION: ${AWS_REGION:-us-east-1}
    depends_on:
      - localstack-init
    networks:
      - biyard-network
    profiles:
      - development
      - infra

networks:
  biyard-network:
    driver: bridge
