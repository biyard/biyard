<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Biyard 런치패드 — 기업 정보</title>
<link rel="stylesheet" href="../styles.css">
</head>
<body class="with-sidebar surface-assets">


<header class="topbar">
  <div class="topbar-inner">
    <a href="../01-landing.html" class="brand-logo">
      <span class="dot">B</span>
      <span>Biyard</span>
      <small class="sub">Assets</small>
    </a>
    <nav class="nav">
      <a href="console-token-new.html" class="external">토큰 연결</a>
    </nav>
  </div>
</header>

<aside class="app-sidebar assets-sidebar">
  <div class="sidebar-card enterprise-card">
    <div class="muted tiny">기업</div>
    <div class="h3" style="margin:4px 0">팬덤뮤직랩</div>
    <div class="score"><span class="tier tier-T3">T3</span><b class="tabular">51 / 100</b></div>
    <div class="hint">Biyard Index</div>
  </div>
  <div class="sidebar-section">
    <div class="sidebar-title">Assets</div>
    <a href="05-valuation.html" class="sidebar-link">Index 리포트</a>
    <a href="04-dataroom.html" class="sidebar-link">Data Room</a>
    <a href="03-asset.html" class="sidebar-link">기초자산</a>
    <a href="02-intake.html" class="sidebar-link active">기업 정보</a>
  </div>
  <div class="sidebar-section sidebar-secondary">
    <div class="sidebar-title">LaunchPad</div>
    <a href="console-token-new.html" class="sidebar-link sidebar-bridge">토큰 관리</a>
  </div>
</aside>

<main class="container-narrow">

  

  <section class="panel">
    <div class="panel-head">
      <h2>기업 정보</h2>
      <span class="sub">기업 프로필</span>
    </div>

    <p class="soft" style="margin-top:0">Biyard LaunchPad에서 사용하는 기업 프로필입니다.</p>

    <div class="callout info">
      <div class="callout-title">기업 프로필</div>
      <div class="callout-body">법인명, 사업자등록번호, 대표자, 담당자 정보</div>
    </div>

    <div class="divider"></div>

    <div class="row cols-2">
      <div class="field">
        <label class="label">법인명</label>
        <input class="input" value="팬덤뮤직랩" />
      </div>
      <div class="field">
        <label class="label">사업자등록번호</label>
        <input class="input" placeholder="000-00-00000" value="000-00-00000" />
      </div>
    </div>

    <div class="row cols-2">
      <div class="field">
        <label class="label">대표자</label>
        <input class="input" value="김민준" />
      </div>
      <div class="field">
        <label class="label">대표 이메일</label>
        <input class="input" value="token@fandomlab.co.kr" />
      </div>
    </div>

    <div class="row cols-2">
      <div class="field">
        <label class="label">산업</label>
        <select class="select">
          <option>선택...</option>
          <option>부동산</option>
          <option>미술품·아트</option>
          <option>음악·엔터</option>
          <option>IP·콘텐츠</option>
          <option selected>축산·농수산</option>
          <option>기타</option>
        </select>
      </div>
      <div class="field">
        <label class="label">본사 소재지</label>
        <select class="select">
          <option>선택...</option>
          <option selected>제주특별자치도</option>
          <option>서울특별시</option>
          <option>경기도</option>
          <option>해외</option>
        </select>
      </div>
    </div>

    <div class="field">
      <label class="label">기업 소개 (선택)</label>
      <textarea class="textarea" rows="3" placeholder="회사가 무엇을 하는지 한 문단으로...">지역 기반 프리미엄 농식품 브랜드를 운영하며, 정기배송 회원과 오프라인 유통 채널을 통해 반복 매출을 확보하고 있습니다.</textarea>
      <div class="hint">자료 분류 · Index 입력값</div>
    </div>

    <div class="field">
      <label class="label">웹사이트</label>
      <input class="input" placeholder="https://" value="https://sample-issuer.co.kr" />
    </div>

  </section>

  <div class="nav-actions">
    <a href="console-overview.html" class="btn btn-ghost">← 토큰 요약</a>
    <a href="console-overview.html" class="btn btn-ghost">변경사항 저장</a>
    <a href="03-asset.html" class="btn btn-primary">기초자산 등록</a>
  </div>

</main>

</body>
</html>
