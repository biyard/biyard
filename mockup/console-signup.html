<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Biyard 런치패드 — 기업 등록</title>
<link rel="stylesheet" href="styles.css">
</head>
<body class="surface-launchpad">


<header class="topbar">
  <div class="topbar-inner">
    <a href="console-signup.html" class="brand-logo">
      <span class="dot">B</span>
      <span>Biyard</span>
      <small class="sub">Launchpad</small>
    </a>
    <nav class="nav">
      <a href="01-landing.html" class="external">Assets</a>
    </nav>
  </div>
</header>

<main class="container-narrow">

  <section class="panel">
    <div class="panel-head">
      <h2>기업 등록</h2>
      <span class="sub">Biyard LaunchPad</span>
    </div>

    <p class="soft" style="margin-top:0">기업 계정을 만든 뒤 기초자산 등록을 시작합니다.</p>

    <div class="row cols-2">
      <div class="field">
        <label class="label">법인명</label>
        <input class="input" value="샘플 기업 A" />
      </div>
      <div class="field">
        <label class="label">사업자등록번호</label>
        <input class="input" value="000-00-00000" />
      </div>
    </div>

    <div class="row cols-2">
      <div class="field">
        <label class="label">담당자 이메일</label>
        <input class="input" value="issuer@example.co.kr" />
      </div>
      <div class="field">
        <label class="label">담당자 이름</label>
        <input class="input" value="Ryan Cho" />
      </div>
    </div>

    <div class="row cols-2">
      <div class="field">
        <label class="label">기업 도메인</label>
        <input class="input" value="sample.co.kr" />
      </div>
      <div class="field">
        <label class="label">비밀번호</label>
        <input class="input" type="password" value="••••••••••" />
      </div>
    </div>

    <div class="divider"></div>

    <div class="field">
      <label style="display:flex; align-items:center; gap:8px; cursor:pointer;">
        <input type="checkbox" checked />
        <span class="soft tiny">이용약관 및 개인정보처리방침 동의</span>
      </label>
      <label style="display:flex; align-items:center; gap:8px; cursor:pointer; margin-top:8px;">
        <input type="checkbox" checked />
        <span class="soft tiny">Biyard Index 산출을 위한 데이터 처리 동의</span>
      </label>
    </div>

  </section>

  <div class="nav-actions">
    <a href="01-landing.html" class="btn btn-ghost">← Assets</a>
    <a href="03-asset.html" class="btn btn-primary">기초자산 등록 →</a>
  </div>

</main>

</body>
</html>
