name: Production deploy

on:
  push:
    branches:
      - main

env:
  CARGO_TERM_COLOR: always

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.15.0 --activate

      - name: Deploy to S3
        env:
          ENV: prod
          API_URL: https://api.biyard.co
          CONSOLE_URL: https://console.biyard.co
        run: |
          make sync-landing

  app:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: recursive
          ssh-key: ${{ secrets.PULL_KEY_REPO }}

      - name: Cache builder
        id: app-build-cache
        uses: actions/cache@v4
        with:
          key: app-build-${{ runner.os }}-rust-${{ env.RUSTC_HASH }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            app-build-${{ runner.os }}-rust-${{ env.RUSTC_HASH }}-
            app-build-${{ runner.os }}-
            app-build-
          path: |
            target

      - uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy, rustfmt
          toolchain: stable
          targets: wasm32-unknown-unknown

      - name: Install Dioxus CLI
        run: cargo install dioxus-cli

      - name: Build Dioxus app
        working-directory: app
        env:
          ENV: prod
          DYNAMO_TABLE_PREFIX: biyard-prod
        run: make build

      - name: Sync static assets to S3
        env:
          ENV: prod
        run: make sync-app-assets

      - name: Build and push Docker image
        working-directory: app
        env:
          ENV: prod
        run: |
          make docker.login
          make docker
          make docker.push

  api:
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: api

    steps:
      - uses: actions/checkout@v3
        with:
          submodules: recursive
          ssh-key: ${{ secrets.PULL_KEY_REPO }}
      - name: Cache builder
        id: api-build-cache
        uses: actions/cache@v4
        with:
          key: api-build-${{ runner.os }}-rust-${{ env.RUSTC_HASH }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            api-build-${{ runner.os }}-rust-${{ env.RUSTC_HASH }}-
            api-build-${{ runner.os }}-
            api-build-
          path: |
            api/target

      - uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy, rustfmt
          toolchain: stable
      - name: Building APIs
        env:
          REGION: ap-northeast-2
          ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

          DISABLE_ANSI: false
          WEB_BUILD: false

          ENV: prod
          RUST_LOG: info
          DYNAMO_ENDPOINT: none
        run: |
          make docker.build
          make docker.login
          make docker.push

  deploy:
    runs-on: ubuntu-latest
    needs: [web, app, api]
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: recursive
          ssh-key: ${{ secrets.PULL_KEY_REPO }}

      - uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      - name: Deploy
        env:
          ENV: prod
          REGION: ap-northeast-2
          ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          DOMAIN: biyard.co

        run: |
          npm i -g aws-cdk
          make deploy
