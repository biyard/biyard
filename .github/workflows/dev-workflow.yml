name: Dev deploy

on:
  push:
    branches:
      - dev

env:
  CARGO_TERM_COLOR: always

jobs:
  landing:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
          ssh-key: ${{ secrets.PULL_KEY_REPO }}

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      - name: Login to Amazon ECR
        id: landing-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy, rustfmt
          toolchain: stable
          target: wasm32-unknown-unknown
          cache: false
          RUSTFLAGS: ""

      - name: Cache builder
        uses: actions/cache@v5
        with:
          key: landing-build-${{ runner.os }}-rust-${{ env.RUSTC_HASH }}-${{ hashFiles('**/Cargo.lock') }}-${{ github.run_id }}
          restore-keys: |
            landing-build-${{ runner.os }}-rust-${{ env.RUSTC_HASH }}-
          path: |
            target

      - uses: cargo-bins/cargo-binstall@main

      - name: Install Dioxus CLI
        run: cargo binstall dioxus-cli@0.7.3 --force

      - name: Clean Dioxus build output
        run: rm -rf target/dx

      - name: Build Landing (Lambda)
        working-directory: landing
        env:
          ENV: dev
          CONSOLE_URL: https://console.dev.biyard.co
          RUSTFLAGS: ""
        run: |
          npm install -D tailwindcss @tailwindcss/cli
          make build-lambda

      - name: Build and push Docker image
        working-directory: landing
        env:
          ENV: dev
          ECR: ${{ steps.landing-ecr.outputs.registry }}/biyard/landing
        run: |
          make docker
          make docker.push

      - name: Deploy static assets to S3
        env:
          ENV: dev
        run: |
          make sync-landing

  console:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
          ssh-key: ${{ secrets.PULL_KEY_REPO }}

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy, rustfmt
          toolchain: stable
          target: wasm32-unknown-unknown
          cache: false

      - name: Cache builder
        uses: actions/cache@v5
        with:
          key: console-build-${{ runner.os }}-rust-${{ env.RUSTC_HASH }}-${{ hashFiles('**/Cargo.lock') }}-${{ github.run_id }}
          restore-keys: |
            console-build-${{ runner.os }}-rust-${{ env.RUSTC_HASH }}-
          path: |
            target

      - uses: cargo-bins/cargo-binstall@main

      - name: Install Dioxus CLI
        run: cargo binstall dioxus-cli@0.7.3 --force

      - name: Clean Dioxus build output
        run: rm -rf target/dx

      - name: Login to Amazon ECR
        id: console-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Dioxus console app
        working-directory: console
        env:
          ENV: dev
          DYNAMO_TABLE_PREFIX: biyard-dev
        run: make build

      - name: Build and push Docker image
        working-directory: console
        env:
          ENV: dev
          ECR: ${{ steps.console-ecr.outputs.registry }}/biyard/console
        run: |
          make docker
          make docker.push

  deploy:
    runs-on: ubuntu-latest
    needs: [landing, console]
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
          ssh-key: ${{ secrets.PULL_KEY_REPO }}

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      - name: Deploy
        env:
          ENV: dev
          REGION: ap-northeast-2
          ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          DOMAIN: dev.biyard.co
        run: |
          npm i -g aws-cdk
          make deploy

  create-release-pr:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/dev'
    needs: [deploy]
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
          ssh-key: ${{ secrets.PULL_KEY_REPO }}
      - name: Git pr release action
        uses: grassedge/git-pr-release-action@v1.0
        with:
          base: main
          head: dev
          token: ${{ secrets.GITHUB_TOKEN }}
